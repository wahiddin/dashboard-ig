<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instagram Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #17160f;
    --panel: #201e17;
    --panel-2: #26241b;
    --hairline: #37341f;
    --amber: #e8a33d;
    --amber-dim: #9c7230;
    --green: #7c9473;
    --text: #ece7dd;
    --text-muted: #8f897c;
    --radius: 3px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(232,163,61,0.06), transparent 45%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  .wrap { max-width: 1080px; margin: 0 auto; }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin: 0 0 8px;
  }

  /* ---- Header ---- */
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-bottom: 28px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--hairline);
    flex-wrap: wrap;
  }

  .avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--amber-dim);
    background: var(--panel-2);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 26px;
    margin: 0 0 2px;
    letter-spacing: 0.01em;
  }

  header .handle {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-muted);
    font-size: 13px;
  }

  header .bio {
    color: var(--text-muted);
    font-size: 13.5px;
    max-width: 480px;
    margin-top: 6px;
    line-height: 1.4;
  }

  .last-updated {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
  }
  .last-updated .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    box-shadow: 0 0 6px var(--green);
  }

  /* ---- Stat grid ---- */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--hairline);
    border: 1px solid var(--hairline);
    margin-bottom: 40px;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .stat {
    background: var(--panel);
    padding: 20px 22px;
  }

  .stat .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .stat .value {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1;
  }

  .stat .value.hero { color: var(--amber); }

  .stat .delta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    margin-top: 8px;
    color: var(--green);
  }
  .stat .delta.negative { color: #c17a6b; }

  /* ---- Chart panel ---- */
  .panel {
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 40px;
  }

  .panel-title {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 18px;
    color: var(--text);
  }

  .chart-holder { height: 240px; position: relative; }

  /* ---- Contact sheet (posts) ---- */
  .sheet-title {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 16px;
  }

  .contact-sheet {
    position: relative;
    padding: 20px 28px;
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
  }

  .sprockets {
    position: absolute;
    top: 0; bottom: 0;
    width: 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    padding: 10px 0;
  }
  .sprockets.left { left: 0; }
  .sprockets.right { right: 0; }
  .sprockets span {
    width: 8px; height: 8px;
    background: var(--bg);
    border-radius: 1px;
    margin: 0 auto;
    opacity: 0.8;
  }

  .frames {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }

  .frame {
    background: var(--panel-2);
    border: 1px solid var(--hairline);
    border-radius: 2px;
    overflow: hidden;
    transition: border-color 0.15s ease;
  }
  .frame:hover { border-color: var(--amber-dim); }

  .frame .thumb {
    width: 100%;
    aspect-ratio: 1;
    background: #302c20 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%235c563f" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>') center/32px no-repeat;
    background-size: cover;
    background-position: center;
  }

  .frame .meta {
    padding: 10px 12px 12px;
  }
  .frame .caption {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
    height: 34px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .frame .nums {
    display: flex;
    gap: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--amber);
  }
  .frame .nums span { color: var(--text-muted); }

  footer {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 48px;
    opacity: 0.7;
  }

  @media (max-width: 640px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .last-updated { margin-left: 0; text-align: left; }
  }
</style>
</head>
<body>
  <div class="wrap" id="app">
    <p class="eyebrow">Instagram Analytics</p>
    <header id="header"></header>

    <div class="stats" id="stats"></div>

    <div class="panel">
      <p class="panel-title">Pertumbuhan Followers</p>
      <div class="chart-holder"><canvas id="growthChart"></canvas></div>
    </div>

    <p class="sheet-title">Contact Sheet — Post Terbaru</p>
    <div class="contact-sheet">
      <div class="sprockets left" id="sprocketsLeft"></div>
      <div class="frames" id="frames"></div>
      <div class="sprockets right" id="sprocketsRight"></div>
    </div>

    <footer>Instagram Analytics Kit</footer>
  </div>

<script>
const fmt = new Intl.NumberFormat('id-ID');

function timeAgo(iso) {
  if (!iso) return '—';
  const diffMs = Date.now() - new Date(iso).getTime();
  const h = Math.floor(diffMs / 3600000);
  if (h < 1) return 'baru saja';
  if (h < 24) return `${h} jam lalu`;
  return `${Math.floor(h / 24)} hari lalu`;
}

function buildSprockets(containerId, count) {
  const el = document.getElementById(containerId);
  el.innerHTML = Array.from({ length: count }).map(() => '<span></span>').join('');
}
buildSprockets('sprocketsLeft', 10);
buildSprockets('sprocketsRight', 10);

async function loadData() {
  const res = await fetch('data/data.json?_=' + Date.now());
  if (!res.ok) throw new Error('data/data.json tidak ditemukan');
  return res.json();
}

function renderHeader(d) {
  document.getElementById('header').innerHTML = `
    <img class="avatar" src="${d.profile_pic || ''}" onerror="this.style.opacity=0" alt="">
    <div>
      <h1>${d.display_name || d.username}</h1>
      <div class="handle">@${d.username}</div>
      ${d.bio ? `<div class="bio">${d.bio}</div>` : ''}
    </div>
    <div class="last-updated"><span class="dot"></span>Update ${timeAgo(d.last_updated)}</div>
  `;
}

function renderStats(d) {
  const history = d.history || [];
  const prev = history.length > 1 ? history[history.length - 2].followers : d.followers;
  const delta = d.followers - prev;
  const totalLikes = (d.posts || []).reduce((s, p) => s + (p.likes || 0), 0);
  const totalComments = (d.posts || []).reduce((s, p) => s + (p.comments || 0), 0);
  const engagement = d.followers ? (((totalLikes + totalComments) / (d.posts.length || 1)) / d.followers * 100) : 0;

  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="label">Followers</div>
      <div class="value hero">${fmt.format(d.followers)}</div>
      <div class="delta ${delta < 0 ? 'negative' : ''}">${delta >= 0 ? '+' : ''}${fmt.format(delta)} sejak update terakhir</div>
    </div>
    <div class="stat">
      <div class="label">Following</div>
      <div class="value">${fmt.format(d.following)}</div>
    </div>
    <div class="stat">
      <div class="label">Jumlah Post</div>
      <div class="value">${fmt.format(d.posts_count)}</div>
    </div>
    <div class="stat">
      <div class="label">Engagement Rate</div>
      <div class="value">${engagement.toFixed(2)}%</div>
    </div>
  `;
}

function renderChart(d) {
  const history = d.history || [];
  const ctx = document.getElementById('growthChart');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.map(h => h.date.slice(5)),
      datasets: [{
        data: history.map(h => h.followers),
        borderColor: '#e8a33d',
        backgroundColor: 'rgba(232,163,61,0.08)',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointBackgroundColor: '#e8a33d',
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8f897c', font: { family: 'IBM Plex Mono', size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#8f897c', font: { family: 'IBM Plex Mono', size: 10 } } }
      }
    }
  });
}

function renderFrames(d) {
  const posts = d.posts || [];
  document.getElementById('frames').innerHTML = posts.map(p => `
    <a class="frame" href="${p.url}" target="_blank" rel="noopener">
      <div class="thumb" style="${p.thumbnail ? `background-image:url('${p.thumbnail}')` : ''}"></div>
      <div class="meta">
        <div class="caption">${(p.caption || '').replace(/</g, '&lt;')}</div>
        <div class="nums">
          <span>♥</span> ${fmt.format(p.likes)}
          <span>·</span>
          <span>💬</span> ${fmt.format(p.comments)}
        </div>
      </div>
    </a>
  `).join('');
}

loadData()
  .then(d => {
    renderHeader(d);
    renderStats(d);
    renderChart(d);
    renderFrames(d);
  })
  .catch(err => {
    document.getElementById('app').innerHTML = `
      <p class="eyebrow">Instagram Analytics</p>
      <div class="panel">
        <p class="panel-title">Data belum tersedia</p>
        <p style="color:var(--text-muted); font-size:13px;">
          ${err.message}. Jalankan workflow scrape di tab GitHub Actions, atau tunggu jadwal otomatisnya.
        </p>
      </div>
    `;
  });
</script>
</body>
</html>
